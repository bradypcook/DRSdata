name: Deploy Next.js site to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # CACHE DISABLED for testing native module rebuild issues
      # - name: Cache node modules
      #   uses: actions/cache@v4
      #   with:
      #     path: drsdata/node_modules
      #     key: ${{ runner.os }}-node-modules-${{ hashFiles('drsdata/package-lock.json') }}
      #     restore-keys: |
      #       ${{ runner.os }}-node-modules-

      - name: Install dependencies
        working-directory: ./drsdata
        run: npm install

      - name: Rebuild native modules for Linux
        working-directory: ./drsdata
        run: npm rebuild

      - name: Build Next.js site
        working-directory: ./drsdata
        run: npx next build

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: drsdata/out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
